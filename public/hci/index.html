<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Himalaya Salud · Tu salud en tus manos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="phone.css" />
<link rel="stylesheet" href="landing.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Landing Himalaya Salud">

<div id="app"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/PhoneMock.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAKS_DEFAULT = /*EDITMODE-BEGIN*/{
  "heroCopy": "salud",
  "darkHero": false,
  "accentMint": false
}/*EDITMODE-END*/;

const App = () => {
  const [t, setTweak] = useTweaks(TWEAKS_DEFAULT);

  React.useEffect(() => {
    document.body.classList.toggle("tw-dark", !!t.darkHero);
    document.body.classList.toggle("tw-mint", !!t.accentMint);
  }, [t.darkHero, t.accentMint]);

  const { Nav, Hero, Cobertura, SOSSection, Features, How, Testimonials, FinalCTA, Footer } = window.LandingSections;

  return (
    <>
      <Nav />
      <Hero heroCopy={t.heroCopy} />
      <Cobertura />
      <SOSSection />
      <Features />
      <How />
      <Testimonials />
      <FinalCTA />
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Hero">
          <TweakRadio
            label="Copy del título"
            value={t.heroCopy}
            onChange={v => setTweak("heroCopy", v)}
            options={[
              { value: "salud", label: "Tu salud" },
              { value: "familia", label: "Familia" },
              { value: "emergencia", label: "Emergencia" },
            ]}
          />
          <TweakToggle
            label="Hero oscuro"
            value={t.darkHero}
            onChange={v => setTweak("darkHero", v)}
          />
        </TweakSection>
        <TweakSection title="Color">
          <TweakToggle
            label="Acento mint (en vez de teal)"
            value={t.accentMint}
            onChange={v => setTweak("accentMint", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>

</body>
</html>
